<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFS Platform - Aadhaar eKYC</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>Aadhaar eKYC</h1>
      <nav class="desktop-nav"><a href="/rates.html">Cancel</a></nav>
      <a href="/rates.html" style="color:#ffffff; text-decoration:none; font-weight:500;" class="mobile-only">Cancel</a>
    </header>
    
    <div class="container center-content">
      <main style="width: 100%;">
        <div class="narrow-content">
          <div style="margin-bottom: 1.5rem; text-align: left;">
            <span class="status-badge" style="background: #e0e7ff; color: #3730a3; padding: 0.5rem 1rem;">Step 2 of 4: Aadhaar</span>
          </div>
          
          <div id="stepInitiate" style="box-shadow: none; border: none; padding: 0; text-align: left;">
            <h2>Aadhaar Verification</h2>
            <p>Enter your 12-digit Aadhaar number to receive an OTP on your registered mobile number.</p>
            
            <form id="aadhaarForm" onsubmit="handleAadhaar(event)" style="box-shadow: none; border: none; padding: 0;">
              <div class="form-group">
                <label for="aadhaar">Aadhaar Number</label>
                <input type="text" id="aadhaar" placeholder="1234 5678 9012" maxlength="12" required>
              </div>
              
              <div id="aadhaarError" class="error"></div>
              
              <button type="submit" id="submitBtn" class="btn" style="margin-top: 1.5rem;">Send OTP</button>
            </form>
          </div>

          <div id="stepVerify" style="display: none; box-shadow: none; border: none; padding: 0; text-align: left;">
            <h2>Verify OTP</h2>
            <p>Enter the 6-digit OTP sent to your Aadhaar-linked mobile number.</p>
            
            <form id="otpForm" onsubmit="handleOtp(event)" style="box-shadow: none; border: none; padding: 0;">
              <div class="form-group">
                <label for="otp">OTP</label>
                <input type="text" id="otp" placeholder="123456" maxlength="6" value="123456" required>
              </div>
              
              <div id="otpError" class="error"></div>
              
              <button type="submit" id="verifyBtn" class="btn" style="margin-top: 1.5rem;">Verify & Continue</button>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/aadhaar.js"></script>
  <style>
    @media (min-width: 768px) { .mobile-only { display: none !important; } }
  </style>
</body>
</html>
