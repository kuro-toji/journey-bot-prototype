<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FD Platform - Aadhaar eKYC</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Aadhaar eKYC</h1>
      <a href="/rates.html" style="color:#3b82f6; text-decoration:none; font-weight:500;">Cancel</a>
    </header>
    
    <main>
      <div style="margin-bottom: 1.5rem;">
        <span class="status-badge" style="background: #e0e7ff; color: #3730a3; padding: 0.5rem 1rem;">Step 2 of 4: Aadhaar</span>
      </div>
      
      <div id="stepInitiate">
        <h2>Aadhaar Verification</h2>
        <p>Enter your 12-digit Aadhaar number to receive an OTP on your registered mobile number.</p>
        
        <form id="aadhaarForm" onsubmit="handleAadhaar(event)">
          <div class="form-group">
            <label for="aadhaar">Aadhaar Number</label>
            <input type="text" id="aadhaar" placeholder="1234 5678 9012" maxlength="12" required>
          </div>
          
          <div id="aadhaarError" class="error"></div>
          
          <button type="submit" id="submitBtn" class="btn" style="margin-top: 1.5rem;">Send OTP</button>
        </form>
      </div>

      <div id="stepVerify" style="display: none;">
        <h2>Verify OTP</h2>
        <p>Enter the 6-digit OTP sent to your Aadhaar-linked mobile number.</p>
        
        <form id="otpForm" onsubmit="handleOtp(event)">
          <div class="form-group">
            <label for="otp">OTP</label>
            <input type="text" id="otp" placeholder="123456" maxlength="6" value="123456" required>
          </div>
          
          <div id="otpError" class="error"></div>
          
          <button type="submit" id="verifyBtn" class="btn" style="margin-top: 1.5rem;">Verify & Continue</button>
        </form>
      </div>
    </main>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/aadhaar.js"></script>
</body>
</html>
