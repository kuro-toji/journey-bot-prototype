<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFS Platform - Book FD</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>Book FD</h1>
      <nav class="desktop-nav"><a href="/rates.html">Cancel</a></nav>
      <a href="/rates.html" style="color:#ffffff; text-decoration:none; font-weight:500;" class="mobile-only">Cancel</a>
    </header>
    
    <div class="container center-content">
      <main style="width: 100%;">
        <div class="narrow-content">
          <div style="margin-bottom: 1.5rem; text-align: left;">
            <span class="status-badge" style="background: #e0e7ff; color: #3730a3; padding: 0.5rem 1rem;">Step 4 of 4: Booking</span>
          </div>
          
          <div id="rateInfo" class="card" style="display:none; background-color:var(--bg-color); border:1px solid var(--border-color); text-align: left;">
            <h3 id="bankName" style="margin-bottom:0.5rem; color: var(--text-primary);"></h3>
            <p style="margin:0; color: var(--text-secondary);"><span id="ratePct" style="font-weight:700; color:var(--success-color);"></span> for <span id="tenure"></span> months</p>
          </div>
          
          <form id="bookForm" onsubmit="handleBook(event)" style="box-shadow: none; border: none; padding: 0; margin-top: 1.5rem; text-align: left;">
            <div class="form-group">
              <label for="principal">Investment Amount (₹)</label>
              <input type="number" id="principal" placeholder="e.g. 50000" min="1000" required>
            </div>
            
            <div class="form-group">
              <label for="nomineeName">Nominee Name (Optional)</label>
              <input type="text" id="nomineeName" placeholder="Enter nominee full name">
            </div>
            
            <div class="form-group">
              <label for="nomineeRel">Nominee Relationship</label>
              <select id="nomineeRel">
                <option value="">Select relationship...</option>
                <option value="spouse">Spouse</option>
                <option value="father">Father</option>
                <option value="mother">Mother</option>
                <option value="son">Son</option>
                <option value="daughter">Daughter</option>
                <option value="other">Other</option>
              </select>
            </div>
            
            <div id="bookError" class="error"></div>
            
            <button type="submit" id="submitBtn" class="btn" style="margin-top: 1rem;">Confirm Booking</button>
          </form>
        </div>
      </main>
    </div>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/book.js"></script>
  <style>
    @media (min-width: 768px) { .mobile-only { display: none !important; } }
  </style>
</body>
</html>
