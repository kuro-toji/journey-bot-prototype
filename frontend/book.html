<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JioFinance - Book FD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="app-wrapper">
    <header>
      <div class="brand-mark">
        <div class="brand-logo">Jio</div>
        <h1>Book FD</h1>
      </div>
      <nav class="desktop-nav"><a href="/rates.html">Cancel</a></nav>
      <a href="/rates.html" class="btn-link mobile-only">Cancel</a>
    </header>

    <div class="container center-content">
      <main style="width: 100%;">
        <div class="narrow-content">
          <span class="step-badge">Step 4 of 4: Booking</span>

          <div id="rateInfo" class="card" style="display:none; background-color: var(--primary-soft); border-color: transparent; text-align: left;">
            <div class="card-header" style="margin-bottom: 0.4rem;">
              <div id="bankLogo" class="bank-logo" style="background-color: #FFF5E9; color: #CE912D;"></div>
              <h3 id="bankName" style="margin: 0;"></h3>
            </div>
            <p style="margin: 0; color: var(--text-content); font-size: 0.9rem;">
              <span id="ratePct" style="font-weight: 700; color: var(--primary-soft-text);"></span> for <span id="tenure"></span> months
            </p>
          </div>

          <form id="bookForm" onsubmit="handleBook(event)" class="narrow-form" style="margin-top: 1rem;">
            <div class="form-group">
              <label for="principal">Investment Amount (₹)</label>
              <input type="number" id="principal" placeholder="e.g. 50000" min="1000" required>
            </div>

            <div class="form-group">
              <label for="nomineeName">Nominee Name (Optional)</label>
              <input type="text" id="nomineeName" placeholder="Enter nominee full name">
            </div>

            <div class="form-group">
              <label for="nomineeRel">Nominee Relationship</label>
              <select id="nomineeRel">
                <option value="">Select relationship...</option>
                <option value="spouse">Spouse</option>
                <option value="father">Father</option>
                <option value="mother">Mother</option>
                <option value="son">Son</option>
                <option value="daughter">Daughter</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div id="bookError" class="error"></div>

            <button type="submit" id="submitBtn" class="btn btn-block" style="margin-top: 0.75rem;">Confirm Booking</button>
          </form>
        </div>
      </main>
    </div>

    <footer>
      <a href="#" onclick="return false">Terms of Use</a>
      <a href="#" onclick="return false">Privacy policy</a>
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/book.js"></script>
</body>
</html>
