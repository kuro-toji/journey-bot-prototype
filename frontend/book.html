<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FD Platform - Book FD</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) {
      window.location.replace('/login.html');
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Book FD</h1>
      <a href="/rates.html" style="color:#3b82f6; text-decoration:none; font-weight:500;">Cancel</a>
    </header>
    
    <main>
      <div id="rateInfo" class="card" style="display:none; background-color:#f8fafc; border:none;">
        <h3 id="bankName" style="margin-bottom:0.5rem;"></h3>
        <p style="margin:0;"><span id="ratePct" style="font-weight:700; color:#059669;"></span> for <span id="tenure"></span> months</p>
      </div>
      
      <form id="bookForm" onsubmit="handleBook(event)">
        <div class="form-group">
          <label for="principal">Investment Amount (₹)</label>
          <input type="number" id="principal" placeholder="e.g. 50000" min="1000" required>
        </div>
        
        <div class="form-group">
          <label for="nomineeName">Nominee Name (Optional)</label>
          <input type="text" id="nomineeName" placeholder="Enter nominee full name">
        </div>
        
        <div class="form-group">
          <label for="nomineeRel">Nominee Relationship</label>
          <select id="nomineeRel">
            <option value="">Select relationship...</option>
            <option value="spouse">Spouse</option>
            <option value="father">Father</option>
            <option value="mother">Mother</option>
            <option value="son">Son</option>
            <option value="daughter">Daughter</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div id="bookError" class="error"></div>
        
        <button type="submit" id="submitBtn" class="btn" style="margin-top: 1rem;">Confirm Booking</button>
      </form>
    </main>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/book.js"></script>
</body>
</html>
