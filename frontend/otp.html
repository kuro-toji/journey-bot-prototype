<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JioFinance - Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-wrapper">
    <header>
      <div class="brand-mark">
        <div class="brand-logo">Jio</div>
        <h1>Fixed Deposit</h1>
      </div>
    </header>

    <div class="container center-content">
      <main style="width: 100%;">
        <div class="narrow-content">
          <h2>Verify Mobile</h2>
          <p>Enter the 6-digit OTP sent to +91 <span id="displayPhone" style="font-weight: 600;"></span></p>

          <form id="otpForm" onsubmit="handleOtp(event)" class="narrow-form">
            <div class="form-group">
              <label for="otp">OTP</label>
              <input type="text" id="otp" placeholder="123456" maxlength="6" value="123456" autocomplete="one-time-code">
              <div id="otpError" class="error"></div>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-block">Verify OTP</button>
            <a href="/login.html" class="btn btn-secondary btn-block" style="margin-top: 0.75rem;">Back to Login</a>
          </form>
        </div>
      </main>
    </div>

    <footer>
      <a href="#" onclick="return false">Terms of Use</a>
      <a href="#" onclick="return false">Privacy policy</a>
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
