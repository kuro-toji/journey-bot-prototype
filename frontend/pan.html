<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FD Platform - PAN Verification</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>PAN Verification</h1>
      <a href="/rates.html" style="color:#3b82f6; text-decoration:none; font-weight:500;">Cancel</a>
    </header>
    
    <main>
      <div style="margin-bottom: 1.5rem;">
        <span class="status-badge" style="background: #e0e7ff; color: #3730a3; padding: 0.5rem 1rem;">Step 1 of 4: PAN</span>
      </div>
      
      <h2>Verify your Identity</h2>
      <p>Enter your PAN details to continue</p>
      
      <form id="panForm" onsubmit="handlePan(event)">
        <div class="form-group">
          <label for="pan">PAN Number</label>
          <input type="text" id="pan" placeholder="ABCDE1234F" style="text-transform: uppercase;" required>
        </div>
        
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" required>
        </div>
        
        <div id="panError" class="error"></div>
        
        <button type="submit" id="submitBtn" class="btn" style="margin-top: 1.5rem;">Verify PAN</button>
      </form>
    </main>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/pan.js"></script>
</body>
</html>
