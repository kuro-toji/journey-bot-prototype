<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JFS Platform - Rates</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script>
    if (!localStorage.getItem('token')) window.location.replace('/login.html');
  </script>
</head>
<body>
  <div class="app-wrapper">
    <header>
      <h1>JFS Fixed Deposits</h1>
      <nav class="desktop-nav">
        <a href="/rates.html" class="active">Discover</a>
        <a href="/portfolio.html">Portfolio</a>
        <a href="#" onclick="logout()">Logout</a>
      </nav>
      <!-- Mobile logout -->
      <a href="#" onclick="logout()" style="display: block;" class="mobile-only">Logout</a>
    </header>
    
    <div class="container">
      <main>
        <h2>Discover High-Yield FDs</h2>
        <p>Book a Fixed Deposit in minutes. Zero paperwork.</p>
        <div id="ratesList">Loading rates...</div>
      </main>
    </div>
    
    <div class="bottom-nav">
      <a href="/rates.html" class="nav-item active">Rates</a>
      <a href="/portfolio.html" class="nav-item">Portfolio</a>
    </div>
  </div>
  
  <script src="/js/api.js"></script>
  <script src="/js/rates.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }
  </script>
  <style>
    @media (min-width: 768px) {
      .mobile-only { display: none !important; }
    }
  </style>
</body>
</html>
